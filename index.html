<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shape of My Heart 💙 Karaoke</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial, sans-serif;
    background: linear-gradient(to top, #aee1ff, #d0f0ff);
    overflow: hidden;
}

.heart {
    position: absolute;
    color: #6ec6ff;
    font-size: 20px;
    animation: float 6s linear infinite;
}

@keyframes float {
    0% { transform: translateY(100vh); opacity: 0; }
    50% { opacity: 1; }
    100% { transform: translateY(-10vh); opacity: 0; }
}

.container {
    background: rgba(255,255,255,0.95);
    padding: 40px;
    border-radius: 25px;
    text-align: center;
    max-width: 650px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.1);
}

h1 {
    color: #4aa3df;
    font-size: 2.2em;
    margin-bottom: 10px;
}

h2 {
    color: #6ec6ff;
    font-size: 1.2em;
    margin-top: 0;
}

.lyrics {
    font-size: 1.8em;
    line-height: 1.5;
    height: 420px;
    overflow-y: auto;
    text-align: left;
    margin: 20px 0;
}

.line {
    opacity: 0;
    animation: fadeLine 1.2s forwards;
    color: #0077ff;
    text-shadow: 0 0 15px #9ed8ff;
    margin: 18px 0;
    padding: 15px;
    background: rgba(255,255,255,0.6);
    border-radius: 15px;
    display: block;
    font-weight: 500;
}

@keyframes fadeLine {
    0% { opacity: 0; transform: translateY(30px) scale(0.9); }
    100% { opacity: 1; transform: translateY(0) scale(1); }
}

button {
    margin-top: 25px;
    padding: 18px 35px;
    border: none;
    border-radius: 15px;
    background: linear-gradient(45deg, #4aa3df, #6ec6ff);
    color: white;
    cursor: pointer;
    font-size: 18px;
    font-weight: bold;
    transition: all 0.3s;
}

button:hover {
    transform: translateY(-3px);
    box-shadow: 0 10px 25px rgba(74,163,223,0.4);
}

#audio {
    display: none;
}
</style>
</head>

<body>

<div class="container">
<h1>💙 Shape of My Heart 💙</h1>
<h2>Sting</h2>

<div class="lyrics" id="lyrics"></div>

<button onclick="playSong()">▶️ Mulai Karaoke</button>

<!-- LAGU DIRECT PLAY - PIANO VERSION -->
<audio id="audio" loop>
    <source src="https://www.kozco.com/tech/piano2.mp3">
</audio>
</div>

<script>
// LIRIK EXACT SESUAI PERMINTAAN
const lines = [
    "I'm lookin' back on things I've done",
    "I never wanna play the same old part",
    "I'll keep you in the dark (keep you in the dark)",
    "Now let me show you the shape of my heart",
    "Looking back on the things I've done",
    "I was trying to be someone (trying to be someone)",
    "I played my part, kept you in the dark",
    "Now let me show you the shape of my heart (now let me show you the shape of my heart)"
];

const lyricsDiv = document.getElementById("lyrics");
const audio = document.getElementById("audio");

function playSong() {
    audio.currentTime = 0;
    audio.play();

    lyricsDiv.innerHTML = "";

    lines.forEach((line, index) => {
        setTimeout(() => {
            const div = document.createElement("div");
            div.innerText = line;
            div.classList.add("line");
            lyricsDiv.appendChild(div);
            lyricsDiv.scrollTop = lyricsDiv.scrollHeight;
        }, index * 4800); // 4.8 detik per kalimat - PAS!
    });
}

// HEARTS CONTINUOUS
setInterval(() => {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "💙";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.animationDuration = (Math.random() * 3 + 3) + "s";
    document.body.appendChild(heart);
    setTimeout(() => heart.remove(), 7000);
}, 400);

// AUTO START AFTER 2s
setTimeout(() => {
    if (audio.paused) playSong();
}, 2000);
</script>

</body>
</html>
