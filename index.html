<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Karaoke Cute 💙</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial;
    background: linear-gradient(to top, #aee1ff, #d0f0ff);
    overflow: hidden;
}

/* floating hearts */
.heart {
    position: absolute;
    color: #6ec6ff;
    font-size: 20px;
    animation: float 6s linear infinite;
}

@keyframes float {
    0% { transform: translateY(100vh); opacity: 0; }
    50% { opacity: 1; }
    100% { transform: translateY(-10vh); opacity: 0; }
}

.container {
    background: rgba(255,255,255,0.9);
    padding: 30px;
    border-radius: 20px;
    text-align: center;
    max-width: 600px;
}

h1 {
    color: #4aa3df;
}

.lyrics {
    font-size: 1.5em;
    line-height: 2;
}

/* kata muncul animasi */
.word {
    opacity: 0;
    animation: fadeWord 0.4s forwards;
    color: #0077ff;
    text-shadow: 0 0 10px #9ed8ff;
}

@keyframes fadeWord {
    to { opacity: 1; }
}

button {
    margin-top: 20px;
    padding: 10px 20px;
    border: none;
    border-radius: 10px;
    background: #4aa3df;
    color: white;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="container">
<h1>💙 For You 💙</h1>

<div class="lyrics" id="lyrics"></div>

<button onclick="playSong()">Play 💙</button>

<audio id="audio">
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">
</audio>
</div>

<script>
// lirik per kata
const text = "I'm looking back on things I've done I never wanna play the same old part";
const words = text.split(" ");

const lyricsDiv = document.getElementById("lyrics");

// timing per kata (atur sesuai lagu)
const timing = [
0,0.5,1,1.5,2,2.5,3,3.5,4,4.5,5,5.5,6,6.5,7
];

function playSong() {
    const audio = document.getElementById("audio");
    audio.currentTime = 0;
    audio.play();

    // kosongin dulu
    lyricsDiv.innerHTML = "";

    timing.forEach((t, i) => {
        setTimeout(() => {
            if(words[i]) {
                const span = document.createElement("span");
                span.innerText = words[i] + " ";
                span.classList.add("word");
                lyricsDiv.appendChild(span);
            }
        }, t * 1000);
    });
}

// generate hearts
setInterval(() => {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "💙";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = (Math.random() * 20 + 10) + "px";
    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 6000);
}, 500);
</script>

</body>
</html>
