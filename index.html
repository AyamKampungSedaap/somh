<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Karaoke Cute 💙</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial;
    background: linear-gradient(to top, #aee1ff, #d0f0ff);
    overflow: hidden;
}

/* floating hearts */
.heart {
    position: absolute;
    color: #6ec6ff;
    font-size: 20px;
    animation: float 6s linear infinite;
}

@keyframes float {
    0% { transform: translateY(100vh); opacity: 0; }
    50% { opacity: 1; }
    100% { transform: translateY(-10vh); opacity: 0; }
}

.container {
    background: rgba(255,255,255,0.9);
    padding: 30px;
    border-radius: 20px;
    text-align: center;
    max-width: 600px;
}

h1 {
    color: #4aa3df;
}

.lyrics {
    font-size: 1.5em;
    line-height: 2;
}

/* kata muncul animasi */
.word {
    opacity: 0;
    animation: fadeWord 0.4s forwards;
    color: #0077ff;
    text-shadow: 0 0 10px #9ed8ff;
}

@keyframes fadeWord {
    to { opacity: 1; }
}

button {
    margin-top: 20px;
    padding: 10px 20px;
    border: none;
    border-radius: 10px;
    background: #4aa3df;
    color: white;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="container">
<h1>💙 Shape of My Heart 💙</h1>

<div class="lyrics" id="lyrics"></div>

<button onclick="playSong()">Play 💙</button>

<audio id="audio">
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">
</audio>
</div>

<script>
// SEMUA LIRIK SESUAI PERMINTAAN
const text = "I'm lookin' back on things I've done I never wanna play the same old part I'll keep you in the dark keep you in the dark Now let me show you the shape of my heart Looking back on the things I've done I was trying to be someone trying to be someone I played my part kept you in the dark Now let me show you the shape of my heart now let me show you the shape of my heart";
const words = text.split(" ");

const lyricsDiv = document.getElementById("lyrics");

// TIMING SESUAI RITME LAGU (per kata)
const timing = [
0.0,0.4,0.9,1.4,2.0,2.6,3.1,3.6,4.1,4.7,5.2,5.7,6.2,6.7,7.2,
7.7,8.2,8.7,9.2,9.7,10.2,10.7,11.2,11.7,12.2,12.7,13.2,13.7,14.2,
14.7,15.2,15.7,16.2,16.7,17.2,17.7,18.2,18.7,19.2,19.7,20.2,
20.7,21.2,21.7,22.2,22.7,23.2,23.7,24.2,24.7,25.2,25.7,26.2,
26.7,27.2,27.7,28.2,28.7,29.2,29.7,30.2,30.7,31.2,31.7,32.2
];

function playSong() {
    const audio = document.getElementById("audio");
    audio.currentTime = 0;
    audio.play();

    // kosongin dulu
    lyricsDiv.innerHTML = "";

    timing.forEach((t, i) => {
        setTimeout(() => {
            if(words[i]) {
                const span = document.createElement("span");
                span.innerText = words[i] + " ";
                span.classList.add("word");
                lyricsDiv.appendChild(span);
            }
        }, t * 1000);
    });
}

// generate hearts
setInterval(() => {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "💙";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = (Math.random() * 20 + 10) + "px";
    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 6000);
}, 500);
</script>

</body>
</html>
