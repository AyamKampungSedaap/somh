<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shape of My Heart 💙 Karaoke</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial;
    background: linear-gradient(to top, #aee1ff, #d0f0ff);
    overflow: hidden;
}

.heart {
    position: absolute;
    color: #6ec6ff;
    font-size: 20px;
    animation: float 6s linear infinite;
}

@keyframes float {
    0% { transform: translateY(100vh); opacity: 0; }
    50% { opacity: 1; }
    100% { transform: translateY(-10vh); opacity: 0; }
}

.container {
    background: rgba(255,255,255,0.9);
    padding: 30px;
    border-radius: 20px;
    text-align: center;
    max-width: 600px;
}

h1 {
    color: #4aa3df;
    font-size: 2em;
}

.lyrics {
    font-size: 1.8em;
    line-height: 1.6;
    height: 400px;
    overflow-y: auto;
    text-align: left;
}

.line {
    opacity: 0;
    animation: fadeLine 1s forwards;
    color: #0077ff;
    text-shadow: 0 0 15px #9ed8ff;
    margin: 15px 0;
    padding: 10px;
    background: rgba(255,255,255,0.5);
    border-radius: 10px;
    display: block;
}

@keyframes fadeLine {
    0% { opacity: 0; transform: translateY(20px); }
    100% { opacity: 1; transform: translateY(0); }
}

button {
    margin-top: 20px;
    padding: 15px 30px;
    border: none;
    border-radius: 10px;
    background: #4aa3df;
    color: white;
    cursor: pointer;
    font-size: 18px;
}

button:hover {
    background: #3a8bc8;
}
</style>
</head>

<body>

<div class="container">
<h1>💙 Shape of My Heart 💙</h1>
<h2>Sting</h2>

<div class="lyrics" id="lyrics"></div>

<button onclick="playSong()">▶️ Mulai Karaoke</button>

<!-- LAGU KAMU UDAH MASUK! -->
<audio id="audio" loop>
    <source src="https://drive.google.com/uc?export=download&id=1wrS7fAvp-XgSFygZ3QBTtRFeUrZ5Ixt7">
</audio>
</div>

<script>
// LIRIK EXACT 8 KALIMAT
const lines = [
    "I'm lookin' back on things I've done",
    "I never wanna play the same old part",
    "I'll keep you in the dark (keep you in the dark)",
    "Now let me show you the shape of my heart",
    "Looking back on the things I've done",
    "I was trying to be someone (trying to be someone)",
    "I played my part, kept you in the dark",
    "Now let me show you the shape of my heart (now let me show you the shape of my heart)"
];

const lyricsDiv = document.getElementById("lyrics");

function playSong() {
    const audio = document.getElementById("audio");
    audio.currentTime = 0;
    audio.play();

    lyricsDiv.innerHTML = "";

    lines.forEach((line, index) => {
        setTimeout(() => {
            const div = document.createElement("div");
            div.innerText = line;
            div.classList.add("line");
            lyricsDiv.appendChild(div);
            lyricsDiv.scrollTop = lyricsDiv.scrollHeight;
        }, index * 4500); // 4.5 detik per kalimat
    });
}

// HEARTS
setInterval(() => {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "💙";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = (Math.random() * 20 + 10) + "px";
    document.body.appendChild(heart);
    setTimeout(() => heart.remove(), 6000);
}, 500);
</script>

</body>
</html>
